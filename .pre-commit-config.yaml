---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: compile
        name: compile
        entry: python
        args: ["-m", "py_compile"]
        language: system
        types: [python]
      - id: pytest
        name: pytest+coverage
        entry: pytest
        args: ["--cov-fail-under=90", "--cov", "tests"]
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: ["--check"]
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
