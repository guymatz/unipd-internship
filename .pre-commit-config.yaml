---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: compile
        name: compile
        entry: python
        args: ["-m", "py_compile"]
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: pytest
        args: ["."]
        language: system
        types: [python]
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: [--check]
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
